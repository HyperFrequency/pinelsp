# cargo-deny configuration for the pine-rs workspace.
# Run locally / in CI with:  cargo deny --manifest-path pine-rs/Cargo.toml check
#
# Schema targets cargo-deny >= 0.16 (the version installed by
# taiki-e/install-action@cargo-deny in rust-ci.yml).

[advisories]
# Use the default RustSec advisory DB and fail the build on any known
# vulnerability in the dependency tree.
version = 2
yanked = "warn"

[licenses]
# Permissive-only allowlist. Derived from `cargo metadata` over the current
# lockfile: the live tree resolves to MIT / Apache-2.0 / Unicode-3.0 (and a few
# "Unlicense OR MIT" crates that resolve via MIT). The extra permissive SPDX ids
# (BSD/ISC/Zlib) are included for forward-compatibility so a routine dependency
# bump doesn't break CI on an equally-permissive license.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
# Allow the very common dual-MIT/Apache crates to pick either side cleanly.
confidence-threshold = 0.8

[bans]
# Duplicate transitive versions are common and not worth failing CI over.
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Only crates.io is trusted as a registry source.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
