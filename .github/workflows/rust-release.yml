name: Rust Release

# AUTHOR-ONLY: this workflow can only run in GitHub Actions on a `pine-rs-v*`
# tag push. It cannot be exercised in a local dev environment. All secret-gated
# jobs (crates-io / wasm-npm / pypi) no-op when their token secret is empty, and
# the wasm/pypi jobs require emcc / maturin which are provided by the runner
# images, not available locally.
on:
  push:
    tags:
      - "pine-rs-v*"

permissions:
  contents: write

jobs:
  # Build a release `pine-lsp` binary per platform/target and attach to the
  # GitHub Release. Mirrors the action family used by the TS release.yml
  # (softprops/action-gh-release).
  binaries:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # aarch64 linux needs a cross linker; gcc-aarch64 provides it and we point
      # cargo at it via the target-specific linker env var.
      - name: Install aarch64 linux linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build pine-lsp
        working-directory: pine-rs
        run: cargo build --release -p pine-lsp --target ${{ matrix.target }}

      # Package: rename to pine-lsp-<target>(.exe) and archive (zip on Windows,
      # tar.gz elsewhere). Output path is relative to the repo root.
      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          BIN="pine-rs/target/${{ matrix.target }}/release/pine-lsp"
          OUT="pine-lsp-${{ matrix.target }}"
          cp "$BIN" "$OUT"
          tar -czf "$OUT.tar.gz" "$OUT"

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "pine-rs/target/${{ matrix.target }}/release/pine-lsp.exe"
          $out = "pine-lsp-${{ matrix.target }}.exe"
          Copy-Item $bin $out
          Compress-Archive -Path $out -DestinationPath "pine-lsp-${{ matrix.target }}.zip"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pine-lsp-${{ matrix.target }}.tar.gz
            pine-lsp-${{ matrix.target }}.zip

  # STUB / author-only: publishes crates to crates.io in dependency order.
  # No-ops entirely when CARGO_REGISTRY_TOKEN is unset.
  crates-io:
    name: publish crates.io (stub)
    runs-on: ubuntu-latest
    if: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish in dependency order
        working-directory: pine-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # The grammar crate must be published FIRST: every other crate depends
          # on it (directly or transitively via pine-core). Then publish bottom-up
          # through the dependency DAG. `--no-verify` is intentionally omitted so
          # each crate is verified on publish.
          cargo publish -p tree-sitter-pine
          cargo publish -p pine-data-codegen
          cargo publish -p pine-core
          cargo publish -p pine-check
          # Binary crates (pine-cli, pine-mcp, pine-lsp) can be published after
          # their library deps land; add them here once their versions are pinned.

  # STUB / author-only: builds the tree-sitter WASM grammar and publishes the
  # npm package. Requires emcc (Emscripten) which is provided by the runner,
  # NOT available locally. No-ops when NPM_TOKEN is unset.
  wasm-npm:
    name: build + publish wasm/npm (stub)
    runs-on: ubuntu-latest
    if: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
      - name: Build wasm grammar
        run: |
          # tree-sitter generate + `tree-sitter build --wasm` (needs emcc).
          # For Rust-side wasm bindings, wasm-pack / napi would be wired here.
          echo "STUB: tree-sitter generate && tree-sitter build --wasm (requires emcc)"
      - name: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "STUB: npm publish gated on NPM_TOKEN"

  # STUB / author-only: builds Python wheels for the bindings via maturin and
  # publishes to PyPI. maturin runs in GH Actions, not locally. No-ops when
  # PYPI_TOKEN is unset.
  pypi:
    name: build + publish wheels (stub)
    runs-on: ubuntu-latest
    if: ${{ secrets.PYPI_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build + publish wheels
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          # maturin build --release && maturin publish, or `pip wheel` for the
          # python bindings. Requires maturin on the runner.
          echo "STUB: maturin publish gated on PYPI_TOKEN (requires maturin)"
