name: Rust CI

# Scoped to the Rust workspace. The TypeScript CI lives in ci.yml / pr-check.yml
# and is untouched. Path-filtered so it only runs when the Rust tree (or this
# workflow) changes.
#
# NOTE on branch protection: because this workflow is path-filtered, it will not
# run on PRs that don't touch pine-rs/. If it is configured as a *required*
# status check, GitHub may block merges of unrelated PRs waiting on a check that
# never runs. Either keep it non-required, or use a separate "always-runs" gate.
on:
  push:
    paths:
      - "pine-rs/**"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    paths:
      - "pine-rs/**"
      - ".github/workflows/rust-ci.yml"

defaults:
  run:
    working-directory: pine-rs

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pine-rs

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs a prebuilt cargo-deny binary (no source compile).
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      # Run from repo root with an explicit manifest path so the working-directory
      # default doesn't interfere with action setup.
      - name: cargo deny check
        run: cargo deny --manifest-path pine-rs/Cargo.toml check
        working-directory: .
